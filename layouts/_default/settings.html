{{ define "main" }}
<div class="container two-col">
  <section class="content">
    <header class="page-header">
      <h1 class="page-title">{{ .Title }}</h1>
      {{ with .Content }}<div class="page-summary">{{ . }}</div>{{ end }}
    </header>

    <div class="settings-card">
      <h2 class="settings-heading">Reading size</h2>
      <p class="muted small">Adjust the base font size for every page. Saved locally to this browser.</p>

      <div class="settings-presets" role="group" aria-label="Font size presets">
        <button type="button" class="button button-ghost" data-font-preset="0.9">S</button>
        <button type="button" class="button button-ghost" data-font-preset="1">M</button>
        <button type="button" class="button button-ghost" data-font-preset="1.15">L</button>
        <button type="button" class="button button-ghost" data-font-preset="1.3">XL</button>
      </div>

      <label class="settings-slider">
        <span>Custom: <output id="font-output">115%</output></span>
        <input
          id="font-slider"
          type="range"
          min="0.8" max="1.5" step="0.05" value="1.15"
          data-font-slider
        >
      </label>

      <p class="settings-preview prose">
        <strong>Preview.</strong> The quick brown fox jumps over the lazy dog. Sphinx of black quartz, judge my vow.
      </p>

      <div class="settings-actions">
        <button type="button" class="button" data-font-reset>Reset to default</button>
      </div>
    </div>
  </section>

  {{ partial "sidebar.html" . }}
</div>
{{ end }}
