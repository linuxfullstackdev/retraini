<div class="slider-wrapper">
  <div class="slider-container" id="slider-{{ .Get "id" | default "1" }}">
    {{ .Inner }}
  </div>
  
  <button class="slider-arrow prev" aria-label="Previous">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
  </button>
  <button class="slider-arrow next" aria-label="Next">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
  </button>

  <div class="slider-dots"></div>
</div>

<style>
  .slider-wrapper { position: relative; margin: 2rem 0; overflow: hidden; }
  .slider-container {
    display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
    scrollbar-width: none; -ms-overflow-style: none; scroll-behavior: smooth;
    align-items: stretch;
  }
  .slider-container::-webkit-scrollbar { display: none; }
  .slider-item {
    flex: 0 0 100%; scroll-snap-align: start; padding: 1rem; display: flex;
  }
  .slider-card {
    background: var(--c-surface, #fff); border: 1px solid var(--c-border, #e7e8ea);
    border-radius: 12px; padding: 2.5rem; width: 100%; min-height: 250px;
    box-shadow: var(--shadow-sm); transition: transform 0.2s;
    display: flex; flex-direction: column;
  }
  .slider-card h3 { margin-top: 0; font-size: 1.5rem; flex-shrink: 0; }
  .slider-content { flex-grow: 1; overflow-y: auto; }
  .slider-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: var(--c-surface, #fff); border: 1px solid var(--c-border, #e7e8ea);
    border-radius: 50%; width: 40px; height: 40px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; z-index: 10;
    box-shadow: var(--shadow-md); transition: opacity 0.3s, background 0.2s;
  }
  .slider-arrow:hover { background: var(--c-bg-soft, #fafafa); }
  .slider-arrow.prev { left: 10px; }
  .slider-arrow.next { right: 10px; }
  .slider-dots { display: flex; justify-content: center; gap: 8px; margin-top: 1rem; }
  .slider-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--c-border-strong, #cfd2d8);
    cursor: pointer; padding: 0; border: none; transition: background 0.3s;
  }
  .slider-dot.active { background: var(--c-accent, #5b6cff); transform: scale(1.2); }
</style>

<script>
(function() {
  const container = document.getElementById('slider-{{ .Get "id" | default "1" }}');
  if (!container) return;
  const wrapper = container.parentElement;
  const slides = container.querySelectorAll('.slider-item');
  const dotsContainer = wrapper.querySelector('.slider-dots');
  const prevBtn = wrapper.querySelector('.prev');
  const nextBtn = wrapper.querySelector('.next');

  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.classList.add('slider-dot');
    if (i === 0) dot.classList.add('active');
    dot.onclick = () => container.scrollTo({ left: slides[i].offsetLeft, behavior: 'smooth' });
    dotsContainer.appendChild(dot);
  });

  const dots = dotsContainer.querySelectorAll('.slider-dot');
  const updateDots = () => {
    const index = Math.round(container.scrollLeft / container.offsetWidth);
    dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
  };

  container.addEventListener('scroll', updateDots);
  prevBtn.onclick = () => container.scrollBy({ left: -container.offsetWidth, behavior: 'smooth' });
  nextBtn.onclick = () => container.scrollBy({ left: container.offsetWidth, behavior: 'smooth' });
})();
</script>
